services:
  # ─── Backend (FastAPI) ────────────────────────────────────────────
  - type: web
    name: healthcare-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Render frontend URL, e.g. https://your-app.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.9

  # ─── Frontend (Vite/React) ────────────────────────────────────────
  - type: web
    name: healthcare-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to your backend Render URL, e.g. https://healthcare-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html  # Required for React Router (SPA routing)
